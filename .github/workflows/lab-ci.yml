name: Lab CI

on:
  push:
    branches: ["main", "lab/*"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Validate lab
        run: ./scripts/ci/validate-lab.sh
